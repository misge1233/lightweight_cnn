# Configuration file for Wheat Disease Classification Pipeline

# Data paths
data:
  source_dir: "data"
  experiment_dir: "experiment"
  train_split: 0.8
  valid_split: 0.1
  test_split: 0.1
  seed: 42

# Model configuration
model:
  num_classes: 5
  input_size: 224
  classes: ["fusarium_head_blight", "healthy", "septoria", "stem_rust", "yellow_rust"]

# Training configuration
training:
  epochs: 50
  batch_size: 32
  learning_rate: 0.0001
  optimizer: "adam"
  optimizer_params:
    weight_decay: 0.0001  # L2 regularization
  scheduler: "cosine"  # or "step" or "cosine_warmup"
  scheduler_params:
    step_size: 30
    gamma: 0.1
    warmup_epochs: 5  # For cosine_warmup
  early_stopping:
    patience: 10
    min_delta: 0.001
  mixed_precision: true
  num_workers: 4
  pin_memory: true
  label_smoothing: 0.1  # Helps prevent overconfidence and improve generalization

# Data augmentation
augmentation:
  train:
    resize: 224
    random_resized_crop: 224
    random_horizontal_flip: 0.5
    random_vertical_flip: 0.5
    random_rotation: 20  # degrees
    color_jitter:
      brightness: 0.2
      contrast: 0.2
      saturation: 0.2
      hue: 0.1
  val_test:
    resize: 256
    center_crop: 224

# Normalization (ImageNet stats)
normalization:
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

# Pruning configuration
pruning:
  method: "structured"  # structured or unstructured
  pruning_ratio: 0.2  # fraction of channels to prune
  fine_tune_epochs: 10
  importance_metric: "l1_norm"

# Quantization configuration
quantization:
  method: "static"  # static or dynamic
  calibration_samples: 0.1  # fraction of training data for calibration
  export_onnx: true

# Evaluation
evaluation:
  inference_warmup: 10
  inference_runs: 100
  batch_size_inference: 1

# Robustness evaluation
robustness:
  perturbations:
    gaussian_noise:
      sigma: 0.1
    motion_blur:
      kernel_size: 9
    brightness:
      factor: 0.7
    contrast:
      factor: 0.7
    jpeg_compression:
      quality: 30
    downsampling:
      intermediate_size: 112

# Uncertainty evaluation
uncertainty:
  monte_carlo_samples: 10
  dropout_rate: 0.1

# Output paths
output:
  runs_dir: "experiment/runs"
  checkpoints_dir: "experiment/checkpoints"
  logs_dir: "experiment/logs"

